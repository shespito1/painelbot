<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Remoto - Bot TikTok</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Substitua APENAS o apiKey se você tiver criado as credenciais Web. 
        // Como o banco está no "modo de teste", podemos enviar direto pela URL:
        const firebaseConfig = {
            databaseURL: "https://bot-tiktok-e3f95-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.enviarComando = function() {
            const mode = document.getElementById("botMode").value;
            const url = document.getElementById("liveUrl").value;
            const headless = document.getElementById("headless").checked;
            const statusEl = document.getElementById("statusText");
            
            // Verifica o botão de texto dos comentários. Como é remoto, enviaremos um padrão se tiver vazio.
            
            const comando = {
                acao: "iniciar",
                modo: mode,
                url_live: url,
                invisivel: headless,
                timestamp: Date.now()
            };

            statusEl.innerHTML = "Enviando comando para o PC...";
            statusEl.style.color = "yellow";

            set(ref(db, 'comandos_pc'), comando)
            .then(() => {
                statusEl.innerHTML = "✅ Comando Recebido com Sucesso! Seu computador deve iniciar os navegadores agora.";
                statusEl.style.color = "#00ff00";
            })
            .catch((error) => {
                statusEl.innerHTML = "❌ Erro ao enviar: " + error;
                statusEl.style.color = "red";
            });
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #00d2ff; }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00C853, #00796B);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: linear-gradient(135deg, #00E676, #00897B); }
        button:active { transform: scale(0.98); }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #333;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Controle Remoto Bot</h2>
    
    <div class="form-group">
        <label>Modo de Operação</label>
        <select id="botMode">
            <option value="live">🟢 Interagir em Live</option>
            <option value="feed">💬 Comentar no Feed</option>
        </select>
    </div>

    <div class="form-group">
        <label>🔗 Link da Live (se modo Live):</label>
        <input type="text" id="liveUrl" value="https://www.tiktok.com/@usuario/live">
    </div>

    <div class="form-group">
        <label><input type="checkbox" id="headless" checked> 👻 Modo Invisível (Muito mais leve)</label>
    </div>

    <button onclick="enviarComando()">🔥 INICIAR BOT</button>
    
    <div class="status" id="statusText">Seu status aparecerá aqui.</div>
</div>

</body>
</html>
