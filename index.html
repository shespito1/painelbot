<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Remoto - Bot TikTok</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Substitua APENAS o apiKey se você tiver criado as credenciais Web. 
        // Como o banco está no "modo de teste", podemos enviar direto pela URL:
        const firebaseConfig = {
            databaseURL: "https://bot-tiktok-e3f95-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Define as funções de banco de dados neste escopo!
        window.dbRef = ref;
        window.dbSet = set;
        window.appDb = db;

        window.enviarComando = function() {
            const mode = document.getElementById("botMode").value;
            const url = document.getElementById("liveUrl").value;
            const headless = document.getElementById("headless").checked;
            const statusEl = document.getElementById("statusText");
            
            const comentariosRaw = document.getElementById("comentarios").value;
            const comentariosProcessados = comentariosRaw.split('\n').map(c => c.trim()).filter(c => c !== "");
            
            const comando = {
                acao: "iniciar",
                modo: mode,
                url_live: url,
                comentarios: comentariosProcessados,
                invisivel: headless,
                timestamp: Date.now()
            };

            statusEl.innerHTML = "Enviando comando para o PC...";
            statusEl.style.color = "yellow";

            set(ref(db, 'comandos_pc'), comando)
            .then(() => {
                statusEl.innerHTML = "✅ Comando Recebido com Sucesso! Seu computador deve iniciar os navegadores agora.";
                statusEl.style.color = "#00ff00";
            })
            .catch((error) => {
                statusEl.innerHTML = "❌ Erro ao enviar: " + error;
                statusEl.style.color = "red";
            });
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #00d2ff; }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00C853, #00796B);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: linear-gradient(135deg, #00E676, #00897B); }
        button:active { transform: scale(0.98); }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #333;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Controle Remoto Bot</h2>
    
    <div class="form-group">
        <label>Modo de Operação</label>
        <select id="botMode" onchange="mudarModo()">
            <option value="live">🟢 Interagir em Live</option>
            <option value="feed">💬 Comentar no Feed</option>
        </select>
    </div>

    <!-- O QUE MOSTRA QUANDO FOR MODO LIVE -->
    <div id="caixaLive">
        <div class="form-group">
            <label>🔗 Link da Live:</label>
            <input type="text" id="liveUrl" value="https://www.tiktok.com/@usuario/live">
        </div>
    </div>

    <!-- O QUE MOSTRA QUANDO FOR MODO COMENTÁRIOS -->
    <div id="caixaFeed" style="display: none;">
        <div class="form-group">
            <label>💬 Comentários (um por linha):</label>
            <textarea id="comentarios" rows="4" placeholder="Muito bom!&#10;Incrível&#10;Gostei">Muito bom!&#10;Incrível&#10;Sensacional!</textarea>
        </div>
    </div>

    <div class="form-group">
        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="headless" checked style="width: 20px; height: 20px;"> 
            <span>👻 <b>Modo Invisível</b> <br><small style="color: #bbb; font-weight: normal;">(Muito mais leve. Roda em segundo plano)</small></span>
        </label>
    </div>

    <button onclick="enviarComando()" style="margin-bottom: 10px;">🔥 INICIAR CONTAS</button>
    <button onclick="enviarComandoParar()" style="background: linear-gradient(135deg, #d32f2f, #b71c1c); margin-bottom: 10px;">🛑 PARAR TUDO</button>
    <button onclick="mostrarCadastro()" style="background: linear-gradient(135deg, #1976D2, #1565C0);">➕ CADASTRAR CONTA</button>
    
    <div class="status" id="statusText">Painel aguardando...</div>

    <!-- Seção de Cadastro de Contas escondida por padrão -->
    <div id="caixaCadastro" style="display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #444;">
        <h3 style="margin-top: 0; color: #00d2ff;">📝 Nova Conta</h3>
        
        <div class="form-group">
            <label>📧 Email do TikTok:</label>
            <input type="text" id="newEmail" placeholder="seu-email@gmail.com">
        </div>
        
        <div class="form-group">
            <label>🔑 Senha do TikTok:</label>
            <input type="password" id="newPassword" placeholder="SuaSenha123!">
        </div>
        
        <div class="form-group">
            <label>🌐 Proxy (Opcional):</label>
            <input type="text" id="newProxy" placeholder="Deixe 'auto' para usar proxy grátis" value="auto">
        </div>
        
        <button onclick="cadastrarContaRemota()" style="background: linear-gradient(135deg, #FF8C00, #EF6C00);">💾 SALVAR CONTA</button>
        <div class="status" id="statusCadastro" style="display: none;"></div>
    </div>
</div>

<script>
    // Função para esconder a aba da live e mostrar a aba de texto quando trocar
    function mudarModo() {
        const mode = document.getElementById("botMode").value;
        if (mode === "live") {
            document.getElementById("caixaLive").style.display = "block";
            document.getElementById("caixaFeed").style.display = "none";
        } else {
            document.getElementById("caixaLive").style.display = "none";
            document.getElementById("caixaFeed").style.display = "block";
        }
    }

    // Função NOVA para comandar a parada das contas
    window.enviarComandoParar = function() {
        const statusEl = document.getElementById("statusText");
        
        const comando = {
            acao: "parar",
            timestamp: Date.now()
        };

        statusEl.innerHTML = "Enviando comando para PARAR...";
        statusEl.style.color = "yellow";

        window.dbSet(window.dbRef(window.appDb, 'comandos_pc'), comando)
        .then(() => {
            statusEl.innerHTML = "⛔ Comando Recebido! O computador vai desligar os navegadores.";
            statusEl.style.color = "#ff4444";
        })
        .catch((error) => {
            statusEl.innerHTML = "❌ Erro ao enviar: " + error;
            statusEl.style.color = "red";
        });
    }

    // Função para mostrar/esconder o formulário de cadastro
    window.mostrarCadastro = function() {
        const caixa = document.getElementById("caixaCadastro");
        if (caixa.style.display === "none") {
            caixa.style.display = "block";
            // Rola a tela para baixo suavemente
            setTimeout(() => {
                document.querySelector('.container').scrollBy({ top: 300, behavior: 'smooth' });
            }, 100);
        } else {
            caixa.style.display = "none";
        }
    }

    // Função para enviar os dados da nova conta para o Firebase/PC
    window.cadastrarContaRemota = function() {
        const email = document.getElementById("newEmail").value.trim();
        const senha = document.getElementById("newPassword").value.trim();
        const proxy = document.getElementById("newProxy").value.trim();
        const statusCadastro = document.getElementById("statusCadastro");

        if (!email || !senha) {
            alert("⚠️ Por favor, preencha o E-mail e a Senha da conta!");
            return;
        }

        const comando = {
            acao: "cadastrar_conta",
            email: email,
            senha: senha,
            proxy: proxy || "auto",
            timestamp: Date.now()
        };

        statusCadastro.style.display = "block";
        statusCadastro.innerHTML = "Enviando nova conta para o PC...";
        statusCadastro.style.color = "yellow";

        window.dbSet(window.dbRef(window.appDb, 'comandos_pc'), comando)
        .then(() => {
            statusCadastro.innerHTML = "✅ Conta enviada com sucesso para salvamento no PC!";
            statusCadastro.style.color = "#00ff00";
            
            // Limpa os campos depois de enviar
            document.getElementById("newEmail").value = "";
            document.getElementById("newPassword").value = "";
            
            // Avisa o usuário na tela e depois esconde
            setTimeout(() => {
                document.getElementById("caixaCadastro").style.display = "none";
                statusCadastro.style.display = "none";
            }, 3000);
        })
        .catch((error) => {
            statusCadastro.style.display = "block";
            statusCadastro.innerHTML = "❌ Erro de rede. Tente novamente: " + error;
            statusCadastro.style.color = "red";
        });
    }
</script>

</body>
</html>
